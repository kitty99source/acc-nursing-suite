<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict local-only Content-Security-Policy.
      - connect-src 'self' allows fetches ONLY to the same local origin (the loopback
        launcher's /_acc/* bridge for ACC-Inbox staging + letter bytes). No internet,
        no CDNs, no external hosts. When opened via file:// there is no origin to reach,
        so it stays fully offline.
      - default-src 'self' keeps everything local; no CDNs, no external fonts.
      - 'unsafe-inline' is required ONLY because vite-plugin-singlefile inlines the bundled
        JS and CSS directly into this file. No eval is used (production React build).
      - 'wasm-unsafe-eval' lets the bundled Tesseract OCR engine compile its WebAssembly
        (needed to read scanned/image-only PDF letters); it does NOT enable JS eval().
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'none'; worker-src 'self' blob:;"
    />
    <title>ACC District Nursing Admin Suite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
